name: Mirror packages

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      force:
        description: "强制重新同步（即使 Release 已存在）"
        type: boolean
        default: false
      only_software:
        description: "只同步指定软件（留空=全部）；可选 php/nginx/apache/redis"
        type: string
        default: ""
  push:
    paths:
      - "config.yaml"
      - "scripts/sync.py"
      - ".github/workflows/mirror.yml"

concurrency:
  group: mirror
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  mirror:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"


      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install requests pyyaml

      - name: Run sync
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
          FORCE: ${{ github.event_name == 'push' && 'true' || github.event.inputs.force || 'false' }}
          ONLY: ${{ github.event_name == 'push' && 'apache' || github.event.inputs.only_software || '' }}
        run: python scripts/sync.py

      - name: Commit updated manifest
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update manifest.json"
          file_pattern: "manifest.json"
          commit_user_name: "github-actions[bot]"
          commit_user_email: "41898282+github-actions[bot]@users.noreply.github.com"
